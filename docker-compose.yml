services:
  torsearch:
    image: ghcr.io/larhatis/torrsearch:latest
    # Pour developper depuis les sources, remplace la ligne `image:` par : build: .
    container_name: torsearch
    ports:
      - "8080:8000"
    env_file:
      - .env  # TORSEARCH_USERNAME/PASSWORD, TMDB_API_KEY, ... (cf. .env.example)
    environment:
      - TORSEARCH_DB=/data/torsearch.db          # toutes les donnees (volume persistant)
      - TORSEARCH_CONFIG=/bootstrap/bootstrap.yaml
      # Chemins des anciens JSON : importes une fois dans la base s'ils existent (legacy).
      - TORSEARCH_SETTINGS=/data/settings.json
      - TORSEARCH_MONITOR=/data/monitor.json
      - TORSEARCH_USERS=/data/users.json
      - TORSEARCH_LIBRARY=/data/library.json
      - TORSEARCH_SERIES=/data/series.json
      - TORSEARCH_REQUESTS=/data/requests.json
    volumes:
      - ./data:/data
      - ./deploy/bootstrap.yaml:/bootstrap/bootstrap.yaml:ro
    depends_on:
      - transmission
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./transmission/config:/config
      - ./transmission/downloads:/downloads
    restart: unless-stopped
