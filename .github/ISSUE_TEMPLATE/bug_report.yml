name: 🐛 Bug
description: Signaler un dysfonctionnement
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: Description
      description: Que se passe-t-il ? Qu'attendais-tu à la place ?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Voir l'erreur ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / capture
      description: Logs du conteneur ou message d'erreur (sans tes passkeys ni mots de passe).
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / déploiement
      placeholder: "image ghcr :latest, ou commit, + Docker / local"
    validations:
      required: true
