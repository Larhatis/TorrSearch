# Fichier d'AMORCAGE uniquement (1er demarrage). Ensuite, edite la config via la page Reglages de l'UI.
# La source de verite runtime est data/settings.json (gere par l'app).
transmission:
  host: localhost      # hote de Transmission (ex: nom du service docker)
  port: 9091
  username: ""
  password: ""
  https: false

search:
  timeout_seconds: 10

indexers:
  - name: tracker1
    type: torznab
    url: https://tracker1.example/api
    api_key: ${TRACKER1_API_KEY}
    auth: query          # query (defaut) | bearer
    enabled: true
  - name: tracker2
    type: torznab
    url: https://tracker2.example/api
    api_key: ${TRACKER2_API_KEY}
    auth: query
    enabled: true

metadata:
  tmdb_api_key: ${TMDB_API_KEY}   # decouverte par titre ; cle gratuite sur themoviedb.org
