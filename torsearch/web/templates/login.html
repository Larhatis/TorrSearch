<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — TorrSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        colors: {
          slate: { 50:'#ffffff',100:'#ffffff',200:'#cccccc',300:'#aaaaaa',400:'#888888',500:'#888888',600:'#666666',700:'#2a2a2a',800:'#141414',900:'#0a0a0a',950:'#0a0a0a' },
          emerald: { 300:'#33ddee',400:'#00d4e8',500:'#00d4e8',600:'#00d4e8',700:'#00a8b8' }
        }
      } }
    };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans">
  <main class="w-full max-w-sm px-6">
    <div class="rounded-xl border border-slate-700 bg-slate-800 p-8">
      <div class="mb-6 flex flex-col items-center text-center">
        <svg width="34" height="34" viewBox="0 0 5 5" fill="#fff" shape-rendering="crispEdges" class="mb-4" aria-hidden="true"><rect width=".86" height=".86" x="0" y="0"/><rect width=".86" height=".86" x="1" y="0"/><rect width=".86" height=".86" x="2" y="0"/><rect width=".86" height=".86" x="3" y="0"/><rect width=".86" height=".86" x="4" y="0"/><rect width=".86" height=".86" x="2" y="1"/><rect width=".86" height=".86" x="2" y="2"/><rect width=".86" height=".86" x="2" y="3"/><rect width=".86" height=".86" x="2" y="4"/></svg>
        <h1 class="text-2xl font-bold tracking-wide text-white">Connexion</h1>
        <p class="mt-1 text-sm text-slate-400">Accès à ta bibliothèque</p>
      </div>
      {% if error %}
      <p class="mb-4 rounded-lg border border-red-500/40 bg-red-500/15 px-3 py-2 text-sm text-red-300">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login" class="space-y-3">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="flex items-center gap-2.5 rounded-lg border border-slate-700 bg-[#1a1a1a] px-3 focus-within:border-emerald-400">
          <i class="ti ti-user text-slate-500"></i>
          <input id="username" name="username" type="text" autocomplete="username" autofocus placeholder="Identifiant"
                 class="w-full bg-transparent py-2.5 text-white placeholder-slate-500 focus:outline-none">
        </div>
        <div class="flex items-center gap-2.5 rounded-lg border border-slate-700 bg-[#1a1a1a] px-3 focus-within:border-emerald-400">
          <i class="ti ti-lock text-slate-500"></i>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Mot de passe"
                 class="w-full bg-transparent py-2.5 text-white placeholder-slate-500 focus:outline-none">
        </div>
        <button type="submit"
                class="w-full rounded-lg bg-emerald-500 py-2.5 font-semibold text-slate-900 hover:bg-emerald-400">Se connecter</button>
      </form>
    </div>
  </main>
</body>
</html>
